<div class="container">
    <section class="bg-light py-4">
    <div class="row mb-4">
            <div class="col-12">
                <h4 class="fw-semibold text-dark">Trending Products</h4>
                <hr class="w-25">
            </div>
        </div>
<div class="row g-4">
            {% for item in products %}
            <div class="col-md-4 col-lg-3">

                <div class="card h-100 shadow-sm border-0 product-card">

                    <!-- FULL CARD CLICKABLE -->
                    <a href="{% url 'product_details' item.category.name item.name %}" class="text-decoration-none text-dark">

                        <!-- Image -->
                        <img src="{{ item.product_image }}"
                             class="card-img-top p-3"
                             style="height:200px; object-fit:contain;"
                             alt="product">

                        <!-- Content -->
                        <div class="card-body text-center">

                            <h6 class="fw-bold">{{ item.name }}</h6>

                            <!-- Price -->
                            <div class="d-flex justify-content-between mt-2">
                                <span class="old_price text-muted small">
                                    <s>Rs.{{ item.original_price }}</s>
                                </span>
                                <span class="new_price fw-bold">
                                    Rs.{{ item.selling_price }}
                                </span>
                            </div>

                        </div>

                    </a>

                </div>

            </div>
            {% endfor %}
        </div>
      </section>
    </div>
