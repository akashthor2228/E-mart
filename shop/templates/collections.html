{% extends 'base.html' %}
{% block content %}

<!-- 🔷 HERO SECTION -->
{% if not request.user.is_authenticated %}

<section class="bg-light py-5 text-center border-bottom">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <h1 class="fw-bold text-dark">Bestsellers</h1>
                <p class="lead text-muted">Explore our top trending collections</p>

                <a href="{% url 'login' %}" class="btn btn-primary me-2 px-4">
                    Already User
                </a>
                <a href="{% url 'register' %}" class="btn btn-outline-secondary px-4">
                    Register
                </a>

            </div>
        </div>
    </div>
</section>
{% endif %}

<!-- 🔷 CATEGORY SECTION -->
<section class="bg-light py-5">
    <div class="container">

        <!-- Title -->
        <div class="row mb-4">
            <div class="col-12">
                <h4 class="fw-semibold text-dark">Categories</h4>
                <hr class="w-25">
            </div>
        </div>

        <!-- Cards -->
        <div class="row g-4">
            {% for item in category %}
            <div class="col-md-4 col-lg-3">

                <div class="card h-100 shadow-sm border-0 category-card">

                    <a href="{% url 'colectionsview' item.name %}" class="text-decoration-none text-dark">

                        <!-- Image -->
                        <img src="{{ item.image }}"
                             class="card-img-top"
                             style="height:200px; object-fit:cover;"
                             alt="category">

                        <!-- Content -->
                        <div class="card-body text-center">
                            <h6 class="card-title fw-bold">{{ item.name }}</h6>
                            <p class="card-text text-muted small mb-0">
                                {{ item.description }}
                            </p>
                        </div>

                    </a>

                </div>

            </div>
            {% endfor %}
        </div>

    </div>
</section>

{% endblock %}
